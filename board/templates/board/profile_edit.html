{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title">プロフィール編集</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">ニックネーム</label>
                            {{ form.first_name }}
                            {% if form.first_name.errors %}
                            <div class="text-danger small mt-1">
                                {% for error in form.first_name.errors %}
                                <strong>{{ error }}</strong>
                                {% endfor %}
                            </div>
                            {% endif %}
                        </div>
                        <button type="submit" class="btn btn-success w-100">保存する</button>
                    </form>
                    <hr>
                    <a href="{% url 'index' %}" class="btn btn-link w-100">戻る</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
