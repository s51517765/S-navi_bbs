{% extends "layout.html" %}
{% block content %}
<h2>新しいパスワードを設定</h2>

{% if validlink %}
  <p>新しいパスワードを2回入力してください。</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">パスワードを変更する</button>
  </form>
{% else %}
  <p>このパスワードリセット用リンクは無効です。恐れ入りますが、再度申請し直してください。</p>
{% endif %}
{% endblock %}
