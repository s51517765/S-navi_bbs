{% extends "layout.html" %}
{% block content %}
<h2>パスワードリセット</h2>
<p>パスワードを忘れましたか? メールアドレスを以下に入力すると、新しいパスワードの設定方法をお知らせします。</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">リセットメールを送信</button>
</form>
<hr>
<div class="text-center mt-3">
    <a href="{% url 'login' %}" class="btn btn-outline-secondary">ログイン画面へ戻る</a>
</div>
{% endblock %}
